<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>명품 거래 - 주문 상세</title>
  <link rel="stylesheet" href="../../dist/style2.css" />
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
  <!-- Navigation Component Placeholder -->
  <div id="navigation" data-src="../components/navigation.html"></div>

  <!-- 헤더 -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="container mx-auto max-w-6xl px-4 py-4 flex items-center justify-between">
      <button onclick="goBack()" class="text-2xl text-gray-700 hover:text-gray-900">
        ←
      </button>
      <h1 class="text-lg font-semibold">주문 상세</h1>
      <div class="w-6"></div>
    </div>
  </header>

  <main class="container mx-auto px-4 py-6 max-w-6xl">
    
    <!-- 주문 정보 헤더 -->
    <section class="bg-white rounded-lg shadow-sm p-6 mb-4">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-xl font-bold mb-2" id="order-status">주문 완료</h2>
          <p class="text-sm text-gray-600">주문번호: <span id="order-number">-</span></p>
          <p class="text-sm text-gray-600">주문일시: <span id="order-date">-</span></p>
        </div>
        <span id="status-badge" class="px-4 py-2 bg-white text-gray-900 rounded-lg font-medium border border-gray-300">
          결제완료
        </span>
      </div>
    </section>

    <!-- 주문 상품 -->
    <section class="bg-white rounded-lg shadow-sm p-6 mb-4">
      <h3 class="text-lg font-bold mb-4">주문 상품</h3>
      <div id="order-products" class="space-y-4">
        <!-- JS로 동적 생성 -->
        <div class="flex items-center gap-4 p-4 border border-gray-200 rounded-lg">
          <div class="w-20 h-20 bg-gray-200 rounded-lg flex-shrink-0"></div>
          <div class="flex-1">
            <p class="font-semibold mb-1">상품명</p>
            <p class="text-sm text-gray-600">브랜드</p>
          </div>
          <div class="text-right">
            <p class="text-sm text-gray-600">수량: 1개</p>
            <p class="font-bold">₩0</p>
          </div>
        </div>
      </div>
    </section>

    <!-- 결제 정보 -->
    <section class="bg-white rounded-lg shadow-sm p-6 mb-4">
      <h3 class="text-lg font-bold mb-4">결제 정보</h3>
      <div class="space-y-3">
        <div class="flex justify-between text-sm">
          <span class="text-gray-600">상품 금액</span>
          <span class="font-medium" id="product-amount">₩0</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-600">배송비</span>
          <span class="font-medium" id="delivery-fee">₩5,000</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-600">쿠폰 할인</span>
          <span class="font-medium text-red-500" id="coupon-discount">-₩0</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-600">포인트 사용</span>
          <span class="font-medium text-red-500" id="point-usage">-₩0</span>
        </div>
        <div class="border-t border-gray-200 pt-3 flex justify-between">
          <span class="font-bold text-lg">최종 결제 금액</span>
          <span class="font-bold text-lg text-red-500" id="total-amount">₩0</span>
        </div>
        <div class="bg-gray-50 rounded-lg p-4 mt-4">
          <div class="flex justify-between text-sm mb-2">
            <span class="text-gray-600">결제 수단</span>
            <span class="font-medium" id="payment-method">카드 결제</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 배송 정보 -->
    <section class="bg-white rounded-lg shadow-sm p-6 mb-4">
      <h3 class="text-lg font-bold mb-4">배송 정보</h3>
      <div class="space-y-3">
        <div class="flex justify-between">
          <span class="text-gray-600 w-32">받는 사람</span>
          <span class="font-medium" id="recipient-name">-</span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-600 w-32">연락처</span>
          <span class="font-medium" id="recipient-phone">-</span>
        </div>
        <div>
          <span class="text-gray-600 block mb-2">배송 주소</span>
          <div class="bg-gray-50 rounded-lg p-4">
            <p class="text-sm mb-1">
              <span class="text-gray-500">우편번호:</span> 
              <span id="zipcode" class="ml-2">-</span>
            </p>
            <p class="text-sm" id="address">-</p>
          </div>
        </div>
        <div>
          <span class="text-gray-600 block mb-2">배송 요청사항</span>
          <div class="bg-gray-50 rounded-lg p-4">
            <p class="text-sm" id="delivery-message">요청사항 없음</p>
          </div>
        </div>
      </div>
    </section>

    <!-- 하단 버튼 -->
    <div class="flex gap-3">
      <button onclick="goBack()" class="flex-1 px-6 py-3 border-2 border-gray-300 rounded-lg font-medium hover:bg-gray-50 transition">
        목록으로
      </button>
      <button onclick="goShopping()" class="flex-1 px-6 py-3 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800 transition">
        쇼핑 계속하기
      </button>
    </div>

  </main>

  <script src="../../js/mypage/order-detail.js"></script>
</body>
</html>
