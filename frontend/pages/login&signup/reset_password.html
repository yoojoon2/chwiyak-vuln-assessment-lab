<!-- /frontend/pages/login&signup/reset_password.html -->
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 재설정 | PREAM</title>

    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />
    <script src="https://unpkg.com/lucide@latest" defer></script>

    <!-- 공통 CSS -->
    <link rel="stylesheet" href="../../dist/style.css" />

    <!-- 공통 JS -->
    <script src="/frontend/js/navigation.js" defer></script>
    <script src="/frontend/js/main.js" defer></script>
  </head>

  <body
    class="min-h-screen flex flex-col items-center justify-start bg-white text-gray-800 overflow-hidden"
  >
    <!-- 상단 네비게이션 -->
    <div id="navigation" data-src="../../components/navigation.html"></div>

    <!-- 메인 컨테이너 -->
    <div class="w-full max-w-sm mx-auto text-center mt-20 mb-16 px-4">
      <!-- 제목 -->
      <h2 class="text-2xl font-bold mb-8">비밀번호 재설정</h2>

      <!-- 비밀번호 재설정 폼 -->
      <form id="resetPwForm" class="space-y-6">
        <!-- 새 비밀번호 -->
        <div class="text-left">
          <label for="password" class="text-sm font-semibold">새 비밀번호</label>
          <input
            id="password"
            type="password"
            placeholder="새 비밀번호를 입력하세요"
            class="w-full border-b border-gray-300 focus:border-black outline-none py-2 text-sm"
          />
        </div>

        <!-- 비밀번호 확인 -->
        <div class="text-left">
          <label for="passwordConfirm" class="text-sm font-semibold">비밀번호 확인</label>
          <input
            id="passwordConfirm"
            type="password"
            placeholder="비밀번호를 다시 입력하세요"
            class="w-full border-b border-gray-300 focus:border-black outline-none py-2 text-sm"
          />
        </div>

        <!-- 버튼 -->
        <button
          type="button"
          onclick="resetPassword()"
          class="w-full bg-black text-white py-3 rounded-md font-semibold hover:bg-gray-900 transition"
        >
          비밀번호 변경
        </button>

        <!-- 하단 안내 -->
        <a
          href="login.html"
          class="block border border-gray-200 py-3 rounded-md text-sm font-semibold mt-3 hover:bg-gray-50 transition"
        >
          로그인으로 돌아가기
        </a>
      </form>
    </div>
  </body>
</html>
