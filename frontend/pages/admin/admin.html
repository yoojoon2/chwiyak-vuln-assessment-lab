<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PREAM 관리자 페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />
  </head>

  <body class="bg-white min-h-screen font-sans flex">
    <!-- 사이드바 -->
    <aside class="w-64 bg-gray-800 text-white flex flex-col">
      <div class="px-6 py-4 text-2xl font-bold border-b border-gray-700">
        PREAM Admin
      </div>

      <nav class="flex-1 px-4 py-6 space-y-3">
        <button
          class="tab-btn w-full text-left px-4 py-2 rounded-md hover:bg-gray-700"
          data-target="user"
        >
          <i class="fa-solid fa-users mr-3"></i>
          사용자 관리
        </button>
        <button
          class="tab-btn w-full text-left px-4 py-2 rounded-md hover:bg-gray-700"
          data-target="inquiry"
        >
          <i class="fa-solid fa-pen-to-square mr-3"></i>
          문의사항 관리
        </button>
        <button
          class="tab-btn w-full text-left px-4 py-2 rounded-md hover:bg-gray-700"
          data-target="notice"
        >
          <i class="fa-solid fa-bell mr-3"></i>
          공지사항 관리
        </button>
        
      </nav>

      <div
        class="border-t border-gray-700 p-4 text-sm flex items-center justify-between"
      >
        <span id="admin-name">관리자님</span>
        <button
          id="logout-btn"
          class="px-3 py-1 bg-gray-700 rounded hover:bg-gray-600 transition"
        >
          로그아웃
        </button>
      </div>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="flex-1 p-8 overflow-y-auto">
      <!-- 사용자 관리 -->
      <section id="tab-user" class="tab-section hidden opacity-0 translate-x-5">
        <h2 class="text-xl font-semibold mb-4">사용자 관리</h2>

        <div class="overflow-y-auto border rounded-lg">
          <table class="w-full text-sm text-center border-collapse" id="user-table">
            <thead class="sticky top-0 bg-gray-100">
              <tr>
                <th class="py-2 px-3 border-b">번호</th>
                <th class="py-2 px-3 border-b">유형</th>
                <th class="py-2 px-3 border-b">이름</th>
                <th class="py-2 px-3 border-b">아이디</th>
                <th class="py-2 px-3 border-b">이메일</th>
                <th class="py-2 px-3 border-b">전화번호</th>
                <th class="py-2 px-3 border-b">상태</th>
              </tr>
            </thead>
            <tbody id="user-table-body"></tbody>
          </table>
        </div>
      </section>

      <!-- 회원 상세 모달 -->
      <div
        id="user-modal"
        class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50"
      >
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 relative">
          <button
            id="user-modal-close"
            class="absolute top-3 right-3 text-gray-400 hover:text-gray-700"
          >
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>

          <h3 class="text-lg font-semibold mb-4">회원 상세정보</h3>

          <div class="space-y-2">
            <p><strong>회원유형:</strong> <span id="detail-role"></span></p>
            <p><strong>이름:</strong> <span id="detail-name"></span></p>
            <p><strong>아이디:</strong> <span id="detail-username"></span></p>
            <p><strong>이메일:</strong> <span id="detail-email"></span></p>
            <p><strong>전화번호:</strong> <span id="detail-phone"></span></p>

            <p id="detail-business" class="hidden">
              <strong>사업자등록번호:</strong>
              <span id="detail-business-number"></span>
            </p>
            <p id="detail-company" class="hidden">
              <strong>회사명:</strong>
              <span id="detail-company-name"></span>
            </p>

            <p><strong>가입일:</strong> <span id="detail-created"></span></p>
            <p><strong>상태:</strong> <span id="detail-status"></span></p>
          </div>

          <div class="mt-6 flex justify-end gap-3">
            <button
              id="btn-toggle-active"
              class="px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-500"
            >
              상태 변경
            </button>
            <button
              id="btn-delete-user"
              class="px-4 py-2 rounded-md bg-red-600 text-white hover:bg-red-500"
            >
              회원 삭제
            </button>
          </div>
        </div>
      </div>

      <!-- 문의사항 관리 -->
<section id="tab-inquiry" class="tab-section hidden opacity-0 translate-x-5">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-semibold">문의사항 관리</h2>
  </div>

  <div class="overflow-y-auto border rounded-lg">
    <table class="w-full text-sm text-center border-collapse" id="inquiry-table">
      <thead class="sticky top-0 bg-gray-100">
        <tr>
          <th class="py-2 px-3 border-b">번호</th>
          <th class="py-2 px-3 border-b">제목</th>
          <th class="py-2 px-3 border-b">작성자 유형</th>
          <th class="py-2 px-3 border-b">등록일</th>
          <th class="py-2 px-3 border-b">상태</th>
        </tr>
      </thead>
      <tbody id="inquiry-table-body"></tbody>
    </table>
  </div>
</section>

<!-- 문의사항 상세 / 답변 모달 -->
<div
  id="inquiry-modal"
  class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50"
>
  <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 relative">
    <button
      id="inquiry-modal-close"
      class="absolute top-3 right-3 text-gray-400 hover:text-gray-700"
    >
      <i class="fa-solid fa-xmark text-xl"></i>
    </button>

    <h3 class="text-lg font-semibold mb-4">문의 상세</h3>

    <div class="space-y-3">
      <p><strong>제목:</strong> <span id="inquiry-title"></span></p>
      <p><strong>내용:</strong> <span id="inquiry-content"></span></p>
      <p><strong>작성자 유형:</strong> <span id="inquiry-role"></span></p>
      <p><strong>등록일:</strong> <span id="inquiry-date"></span></p>
      <p><strong>답변 상태:</strong> <span id="inquiry-status"></span></p>

      <label class="block text-sm font-medium text-gray-700 mt-4">관리자 답변</label>
      <textarea
        id="inquiry-answer"
        rows="5"
        class="w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-gray-300"
        placeholder="답변을 입력하세요."
      ></textarea>
    </div>

    <div class="mt-6 flex justify-end gap-3">
      <button
        id="inquiry-answer-submit"
        class="px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-500"
      >
        답변 등록 / 수정
      </button>
      <button
        id="inquiry-answer-delete"
        class="px-4 py-2 rounded-md bg-red-600 text-white hover:bg-red-500"
      >
        답변 삭제
      </button>
    </div>
  </div>
</div>


      <!-- 공지사항 관리 -->
      <section id="tab-notice" class="tab-section hidden opacity-0 translate-x-5">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-semibold">공지사항 관리</h2>
          <a
            href="./admin_notice.html"
            class="px-4 h-10 inline-flex items-center rounded-md bg-black text-white text-sm hover:opacity-90 active:scale-[.98]"
            >공지 작성</a
          >
        </div>

        <div class="overflow-y-auto border rounded-lg">
          <table
            class="w-full text-sm text-center border-collapse"
            id="notice-table"
          >
            <thead class="sticky top-0 bg-gray-100">
              <tr>
                <th class="py-2 px-3 border-b">번호</th>
                <th class="py-2 px-3 border-b">제목</th>
                <th class="py-2 px-3 border-b">작성자</th>
                <th class="py-2 px-3 border-b">등록일</th>
              </tr>
            </thead>
            <tbody id="notice-table-body"></tbody>
          </table>
        </div>
      </section>

      <!-- 공지사항 상세/수정 모달 -->
      <div
        id="notice-modal"
        class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50"
      >
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 relative">
          <button
            id="notice-modal-close"
            class="absolute top-3 right-3 text-gray-400 hover:text-gray-700"
          >
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>

          <h3 class="text-lg font-semibold mb-4">공지 상세정보</h3>

          <div class="space-y-3">
            <label class="block text-sm font-medium text-gray-700">제목</label>
            <input
              id="notice-title"
              class="w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-gray-300"
            />

            <label class="block text-sm font-medium text-gray-700">내용</label>
            <textarea
              id="notice-content"
              rows="6"
              class="w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-gray-300"
            ></textarea>

            <p id="notice-created" class="text-sm text-gray-500"></p>
          </div>

          <div class="mt-6 flex justify-end gap-3">
            <button
              id="notice-update"
              class="px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-500"
            >
              수정
            </button>
            <button
              id="notice-delete"
              class="px-4 py-2 rounded-md bg-red-600 text-white hover:bg-red-500"
            >
              삭제
            </button>
          </div>
        </div>
      </div>

      
    </main>

    <!-- ✅ 관리자 페이지 스크립트 -->
    <script src="/frontend/js/admin/admin.js" defer></script>
  </body>
</html>
