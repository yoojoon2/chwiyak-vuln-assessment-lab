<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>주문 관리 | PREAM</title>
  <link rel="stylesheet" href="../../dist/style2.css" />
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
  <!-- Navigation Component Placeholder -->
  <div id="navigation" data-src="../components/navigation.html"></div>

  <!-- 헤더 -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="container mx-auto max-w-6xl px-4 py-4 flex items-center justify-between">
      <button onclick="goBack()" class="text-2xl text-gray-700 hover:text-gray-900">
        ←
      </button>
      <h1 class="text-lg font-semibold">주문자 조회</h1>
      <div class="w-6"></div>
    </div>
  </header>

  <main class="container mx-auto px-4 py-6 max-w-6xl">
    
    <!-- 필터 -->
    <section class="bg-white rounded-lg shadow p-4 mb-6">
      <div class="flex gap-4">
        <select class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-gray-900">
          <option value="all">전체</option>
          <option value="pending">주문 대기</option>
          <option value="processing">처리중</option>
          <option value="shipping">배송중</option>
          <option value="completed">배송완료</option>
        </select>
        
        <select class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-gray-900">
          <option value="recent">최근순</option>
          <option value="oldest">오래된순</option>
          <option value="price-high">가격 높은순</option>
          <option value="price-low">가격 낮은순</option>
        </select>
      </div>
    </section>

    <!-- 주문 목록 (JavaScript로 동적 생성됨) -->
    <section class="bg-white rounded-lg shadow">
      <!-- ✅ 여기에 하드코딩된 주문들을 모두 삭제! -->
      <!-- JavaScript가 자동으로 채워줍니다 -->
      <div class="p-8 text-center text-gray-500">
      </div>
    </section>

  </main>

  <script src="../../js/seller/seller-order-list.js"></script>
</body>
</html>
