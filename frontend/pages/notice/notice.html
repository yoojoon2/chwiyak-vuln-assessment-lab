<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공지사항 | PREAM</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons & 공통 네비게이션 -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="/frontend/js/navigation.js" defer></script>

    <!-- 공통 스타일 -->
    <link rel="stylesheet" href="../../dist/style.css" />
  </head>

  <body class="min-h-screen bg-white text-gray-900 flex flex-col">
    <!-- 상단 네비게이션 -->
    <div id="navigation" data-src="../../components/navigation.html"></div>

    <!-- 메인 콘텐츠 -->
    <main class="max-w-5xl mx-auto px-4 py-10 flex-1 w-full">
      <h1 class="text-3xl font-bold text-center mb-8">공지사항</h1>
      <div class="border-b-2 border-gray-400 mb-6"></div>

      <section class="bg-white rounded-2xl">
        <div class="grid grid-cols-[64px_1fr_140px_160px] text-sm text-gray-600 px-2 sm:px-4 py-2 font-semibold border-b bg-white">
          <div class="text-center">No</div>
          <div class="text-center">제목</div>
          <div class="text-center">작성자</div>
          <div class="text-center">작성일</div>
        </div>

        <ul id="notice-list" class="divide-y divide-gray-200">
          <li id="notice-loading" class="px-2 sm:px-4 py-6">
            <div class="animate-pulse h-4 bg-gray-200 rounded w-1/3 mb-3"></div>
            <div class="animate-pulse h-4 bg-gray-200 rounded w-2/3"></div>
          </li>
        </ul>
      </section>
    </main>

    <!-- Footer -->
    <footer class="text-center text-gray-500 text-sm py-6 border-t">
      ⓒ 2025 PREAM. All rights reserved.
    </footer>

    <script src="/frontend/js/notice/notice.js"></script>
  </body>
</html>
